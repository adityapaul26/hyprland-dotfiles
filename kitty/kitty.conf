# vim:fileencoding=utf-8:ft=conf

# --- Dynamic Color Import ---
# This pulls foreground, background, cursor, and color0-15 from matugen
include colors.conf

# --- Font Configuration ---
font_family      JetBrainsMono Nerd Font
italic_font      auto
bold_font        auto
bold_italic_font auto
font_size        11.0

# --- Cursor & UI Integration ---
# Note: cursor and cursor_text_color are handled by colors.conf
shell_integration       no-cursor
cursor_shape            block
cursor_blink_interval   0.5
cursor_stop_blinking_after 15.0

# --- Window Layout & Borders ---
remember_window_size    no
initial_window_width    1200
initial_window_height   800
window_border_width     2
window_margin_width     20
window_padding_width    20
draw_minimal_borders    yes
window_border_radius    16
hide_window_decorations yes

# Border Colors (using values from colors.conf)
# active_border matches url_color/color4; inactive matches color0
active_border_color     #ffb785 
inactive_border_color   #4c4c4c
bell_border_color       #ac8a8c

# --- Tab Bar ---
tab_bar_edge            top
tab_bar_style           powerline
tab_powerline_style     slanted
tab_bar_margin_width    0.0
tab_bar_margin_height   10.0 0.0

# Active Tab Colors (using values from colors.conf)
# background matches url_color; foreground matches theme background
active_tab_foreground   #19120d
active_tab_background   #ffb785
active_tab_font_style   bold

# Inactive Tab Colors (using values from colors.conf)
# foreground matches theme foreground; background matches color8
inactive_tab_foreground #f0dfd6
inactive_tab_background #262626
inactive_tab_font_style normal

# --- Performance & Behavior ---
repaint_delay           10
input_delay             3
sync_to_monitor         yes
scrollback_lines        10000
scrollback_pager        less +G -R
wheel_scroll_multiplier 5.0
mouse_hide_wait         2.0
click_interval          0.5
select_by_word_characters :@-./_~?&=%+#
visual_bell_duration    0.0
enable_audio_bell       no
term                    xterm-kitty

# --- Background Effects ---
background_opacity      0.85
background_blur         80
background_image_layout cscaled
background_tint         1.5

# --- Keybindings ---
map super+v             paste_from_clipboard
map super+c             copy_to_clipboard
map ctrl+shift+t        new_tab
map ctrl+shift+q        close_tab
map ctrl+shift+equal    increase_font_size
map ctrl+shift+minus    decrease_font_size
map ctrl+shift+backspace restore_font_size

# OS Specific
macos_titlebar_color    background
wayland_titlebar_color  background
allow_remote_control    yes

# ===== CURSOR ANIMATION =====
cursor_shape block
cursor_trail 100
cursor_trail_decay 0.15 0.35
cursor_trail_start_threshold 3
mouse_hide_wait 2.0


# Colors matching Catppuccin Mocha
cursor #cba6f7
cursor_text_color #1e1e2e

# Smooth rendering
repaint_delay 8
sync_to_monitor yes

# Optional aesthetics
window_padding_width 8
